<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EquidadeIA</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,300;0,600;0,800;1,300&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --verde:#1a6b4a;--verde-claro:#2d9b6c;--verde-suave:#e8f5ef;
  --azul:#1a4fa3;--azul-claro:#2563eb;--azul-suave:#e8f0fd;
  --amarelo:#f5c842;--amarelo-suave:#fdf8e3;
  --cinza-escuro:#1c1c1e;--cinza:#4a4a52;
  --branco:#f6fbf8;--borda:#c8dfd0;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'DM Sans',sans-serif;background:var(--branco);color:var(--cinza-escuro);min-height:100vh;}
.pagina{display:none;min-height:100vh;position:relative;}
.pagina.ativa{display:block;}
#bg-canvas{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;pointer-events:none;}
header,main,footer,.login-wrap{position:relative;z-index:1;}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px);}to{opacity:1;transform:translateY(0);}}
.perfis-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:.75rem;margin-bottom:1.5rem;}
</style>
</head>
<body>
<div id="pGerador" class="pagina ativa">
  <main>
    <h2>Gerador de Atividades</h2>
    <div class="perfis-grid">
      <div onclick="selecionarPerfil('TEA')">TEA</div>
      <div onclick="selecionarPerfil('TDAH')">TDAH</div>
    </div>
    <textarea id="conteudo" placeholder="Conteúdo"></textarea>
    <button onclick="gerarAtividade()">Gerar</button>
  </main>
</div>
<script>
let perfilSelecionado='';
function selecionarPerfil(p) { perfilSelecionado = p; alert("Selecionado: " + p); }
function gerarAtividade() { alert("Gerando com IA..."); }
</script>
</body>
</html>
